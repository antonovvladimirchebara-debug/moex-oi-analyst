name: Pre-render Posts (SEO)

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'scripts/build-posts.js'

jobs:
  build-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pre-render static HTML for posts
        run: node scripts/build-posts.js

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*/index.html sitemap.xml
          git diff --staged --quiet || git commit -m "build: pre-render posts [skip ci]"
          git push
